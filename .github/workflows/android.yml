name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 9.3.1

    - name: Prepare configuration files
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        fi
        
        # Try to decode the keystore if the base64 file exists
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore.base64..."
          base64 -d debug.keystore.base64 > debug.keystore || echo "Base64 decoding failed"
        fi
        
        # Fallback to keytool if debug.keystore is missing or empty
        if [ ! -f debug.keystore ] || [ ! -s debug.keystore ]; then
          echo "debug.keystore not found or empty. Generating a new one using keytool..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

