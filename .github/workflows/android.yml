- name: Find gradlew in the repository
  id: find-gradlew
  run: |
    set -e
    echo "Searching for gradlew..."
    if [ -f "./gradlew" ]; then
      path="./gradlew"
    elif [ -f "./android/gradlew" ]; then
      path="./android/gradlew"
    else
      # widen search depth a bit
      path=$(find . -maxdepth 6 -type f -name gradlew | head -n 1 || true)
    fi
    # If nothing found, leave empty (we'll generate a wrapper next)
    normalized=$(echo "${path}" | sed 's#^\./##')
    echo "gradlew_path=$normalized" >> $GITHUB_OUTPUT

- name: Generate Gradle wrapper if missing
  if: ${{ steps.find-gradlew.outputs.gradlew_path == '' }}
  run: |
    set -e
    echo "gradlew not found in repo — installing Gradle and generating wrapper"
    # Install SDKMAN and Gradle (non-interactive)
    curl -s "https://get.sdkman.io" | bash
    source "$HOME/.sdkman/bin/sdkman-init.sh"
    sdk install gradle 8.4
    # create wrapper files in repository root
    gradle wrapper --gradle-version 8.4
    chmod +x ./gradlew
    echo "gradlew_path=gradlew" >> $GITHUB_OUTPUT

- name: Grant execute permission for gradlew
  run: |
    chmod +x "${{ steps.find-gradlew.outputs.gradlew_path }}"

- name: Run Gradle build (wrapper)
  run: ./${{ steps.find-gradlew.outputs.gradlew_path }} build --no-daemon
