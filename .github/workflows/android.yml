name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Reduce Gradle memory if needed
      JAVA_TOOL_OPTIONS: -Dorg.gradle.jvmargs=-Xmx1536m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: Find gradlew in the repository
        id: find-gradlew
        run: |
          set -e
          echo "Searching for gradlew..."
          # Preferred common locations
          if [ -f "./gradlew" ]; then
            path="./gradlew"
          elif [ -f "./android/gradlew" ]; then
            path="./android/gradlew"
          else
            # Search up to 4 levels down (adjust maxdepth if your layout is deeper)
            path=$(find . -maxdepth 4 -type f -name gradlew | head -n 1 || true)
          fi

          if [ -z "$path" ]; then
            echo "::error file=.github/workflows/android.yml::gradlew not found in the repository. Ensure the Gradle wrapper is committed or update the workflow to the correct path."
            exit 1
          fi

          # Normalize path (remove leading ./)
          normalized=$(echo "$path" | sed 's#^\./##')
          echo "Found gradlew at: $normalized"
          echo "gradlew_path=$normalized" >> $GITHUB_OUTPUT

      - name: Grant execute permission for gradlew
        run: |
          chmod +x "${{ steps.find-gradlew.outputs.gradlew_path }}"

      - name: Run Gradle build (wrapper)
        run: |
          # run wrapping file directly (works if path is relative)
          ./$(echo "${{ steps.find-gradlew.outputs.gradlew_path }}" | sed 's#^\./##') build --no-daemon
        # Optional: if your project must be built from a subdirectory, you can set working-directory instead:
        # working-directory: androidandroid
